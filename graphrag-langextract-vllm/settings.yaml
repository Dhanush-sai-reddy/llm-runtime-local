# --- Provider Selection ---
# Set 'provider' to either 'openrouter' or 'ollama'
provider: ollama

# --- OpenRouter Config ---
openrouter:
  model: "google/gemini-2.5-flash"
  api_base: "https://openrouter.ai/api/v1"
  # API key loaded from ../.env (OPEN_ROUTER_KEY)

# --- Ollama Config (local failsafe) ---
ollama:
  model: "gemma3:1b"
  api_base: "http://localhost:11434/v1"

# --- Common Settings ---
encoding_model: cl100k_base
skip_workflows: []
concurrent_requests: 4

embeddings:
  llm:
    api_key: "non-empty-key"
    type: openai_embedding
    model: "BAAI/bge-small-en-v1.5"
    api_base: "http://localhost:8000/v1"

input:
  file_type: text
  base_dir: "input"

storage:
  base_dir: "output"

reporting:
  base_dir: "output/reports"

cache:
  base_dir: "output/cache"

cluster_graph:
  max_cluster_size: 10

community_reports:
  max_length: 2000
  max_input_length: 8000
